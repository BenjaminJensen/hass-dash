line-length = 100
target-version = "py311"

[lint]
select = ["E", "F", "W"]
# Ignore list:
# - E402: Module level import not at top (happens in legacy with constants)
# - W293: Blank line contains whitespace (docstring formatting)
# - E501: Line too long (allow up to 100 chars for readability)
ignore = ["E402", "W293", "E501"]

